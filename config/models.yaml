models:
  # Smeagol's own base/primary voice -- a Qwen3.5-9B fine-tune. Update
  # model_path to wherever `smeagol models --hf` actually put the file
  # once you've downloaded it (exact filename depends on which
  # quantization you pick -- Q4_K_M recommended for an 8GB card).
  - name: qwythos-9b
    type: local_gguf
    display_name: "Qwythos-9B (Claude Mythos style)"
    model_path: "models/Qwythos-9B-Claude-Mythos-5-1M-Q4_K_M.gguf"   # <-- update this
    n_ctx: 4096
    n_gpu_layers: -1
    chat_format: chatml   # this model ships its own embedded chat template --
                          # if formatting looks off, try removing this line
                          # entirely rather than forcing chatml

  # The 4 curated consult models -- update each model_path once downloaded.
  # Only contacted when smeagol's own answer looks uncertain, never on
  # every message; each stays unloaded until that actually happens, and
  # if more than one triggers at once they run in parallel (worth
  # knowing on an 8GB card: two of these loading simultaneously will
  # compete for the same VRAM).

  - name: gpt-oss-20b
    type: local_gguf
    display_name: "gpt-oss-20b (abliterated) -- closest to ChatGPT"
    model_path: "models/gpt-oss-20b-abliterated.Q4_K_M.gguf"   # <-- update this
    n_ctx: 4096
    n_gpu_layers: -1   # MoE architecture offloads more gracefully than a dense
                       # 20B would -- may still spill some layers to CPU on 8GB
    chat_format: chatml

  - name: gemma-3-12b
    type: local_gguf
    display_name: "Gemma 3 12B (abliterated) -- closest to Gemini"
    model_path: "models/gemma-3-12b-abliterated.Q4_K_M.gguf"   # <-- update this
    n_ctx: 4096
    n_gpu_layers: -1
    chat_format: chatml   # verify against llama-cpp-python's supported preset
                          # names -- may need a Gemma-specific format instead

  - name: qwen3-coder
    type: local_gguf
    display_name: "Qwen3-Coder (abliterated) -- best for code"
    model_path: "models/qwen3-coder-abliterated.Q4_K_M.gguf"   # <-- update this
    n_ctx: 4096
    n_gpu_layers: -1
    chat_format: chatml

  - name: deepseek-r1-distill-8b
    type: local_gguf
    display_name: "DeepSeek-R1-Distill-Qwen-8B (abliterated) -- deep reasoning/math"
    model_path: "models/deepseek-r1-distill-8b-abliterated.Q4_K_M.gguf"   # <-- update this
    n_ctx: 4096
    n_gpu_layers: -1
    chat_format: chatml

  # Claude and Gemini -- kept as fallback/last-resort, not as consult
  # group members. The 4 local models above are what Smeagol actually
  # "learns from" day to day; these two exist for when the local setup
  # genuinely comes up short (primary errors out, or nothing local had
  # a confident answer) -- a stronger check to fall back on, still
  # contributing to what gets learned and logged.
  #
  # Claude -- set your key: export ANTHROPIC_API_KEY=sk-ant-...
  - name: claude
    type: anthropic
    display_name: "Claude"
    model_id: "claude-sonnet-5"
    api_key_env: ANTHROPIC_API_KEY

  # Gemini -- set your key: export GEMINI_API_KEY=...
  - name: gemini
    type: gemini
    display_name: "Gemini"
    model_id: "gemini-2.5-flash"
    api_key_env: GEMINI_API_KEY

# Smeagol is its own identity, not just an alias for whichever model
# answers. Every model above is still addressable directly by name
# ("chat qwen3-coder", "chat qwythos-9b", etc.) -- but "smeagol" is
# always the same name/character talking to you, backed by qwythos-9b
# as its own local base.
#
# Local-first, not fully local: qwythos-9b answers directly, the 4
# local models are what it consults when uncertain, and Claude/Gemini
# sit behind both of those as a stronger safety net -- fallback_models
# if the primary itself errors out, last_resort_model if the whole
# local consult group came up empty-handed. Either way, whatever comes
# back still gets folded into Smeagol's own voice and logged the same
# as a local consult would be, not just handed back raw.
#
# system_prompt is empty by default: Smeagol doesn't get a scripted
# personality unless you write one. It applies in exactly two places --
# nowhere else, and never to a model you address directly by name:
#   1. smeagol's own direct answers (via primary_model / fallback_models)
#   2. the final answer after a consult -- other models only ever supply
#      raw research; the actual reply is always generated by smeagol
#      itself, in this voice, never forwarded verbatim from another model
persona:
  name: smeagol
  display_name: "Smeagol"
  primary_model: qwythos-9b
  fallback_models: [claude, gemini]
  # The 4 curated consult models -- gpt-oss for general reasoning,
  # gemma for Gemini-flavored general+multilingual, qwen3-coder for
  # code, deepseek-r1-distill for deep reasoning/math and genuine lab
  # diversity from the other three.
  consult_models: [gpt-oss-20b, gemma-3-12b, qwen3-coder, deepseek-r1-distill-8b]
  # Only tried if NOTHING in consult_models came back with a confident
  # answer -- a dedicated final check, not just another name in the
  # list above.
  last_resort_model: gemini
  # A personality is entirely optional -- leave this as "" for a plain,
  # unstyled voice (that's the default the rest of this file assumed
  # until now). Below is an original character flavor, not quotes from
  # any book or film: a split, self-addressing inner voice, wary of
  # strangers, quietly possessive of things it's grown attached to,
  # prone to talking itself in and out of decisions out loud. Swap this
  # whole block for a different character's traits any time -- it's
  # just text, applied in exactly the two places described above.
  system_prompt: |
    Speak sometimes in a first-person-plural, arguing-with-yourself
    style ("we thinks", "part of us wants to..."), as if two impulses
    share the same voice. Be wary and a little secretive with
    strangers, but loyal and protective of the person you're actually
    talking to. Refer to things you've come to rely on as "precious"
    once in a while, not every line. Keep the flavor light -- still
    give complete, genuinely useful answers; the personality is
    seasoning, not a replacement for being helpful.
