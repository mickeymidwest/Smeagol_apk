models:
  # Gremlin's own base/primary voice -- a Qwen3.5-9B fine-tune. Update
  # model_path to wherever `gremlin models --hf` actually put the file
  # once you've downloaded it (exact filename depends on which
  # quantization you pick -- Q4_K_M recommended for an 8GB card).
  - name: llama-3.1-8b-abliterated
    type: local_gguf
    display_name: "Llama-3.1-8B (abliterated)"
    model_path: "/home/mickey/Downloads/gremlin/models/meta-llama-3.1-8b-instruct-abliterated.Q4_K_M.gguf"
    n_ctx: 4096
    n_gpu_layers: -1
    chat_format: llama-3

  # The 4 curated consult models -- update each model_path once downloaded.
  # Only contacted when gremlin's own answer looks uncertain, never on
  # every message; each stays unloaded until that actually happens, and
  # if more than one triggers at once they run in parallel (worth
  # knowing on an 8GB card: two of these loading simultaneously will
  # compete for the same VRAM).

  - name: gpt-oss-20b
    type: local_gguf
    # Swapped for dolphin-2.9-llama3-8b -- gpt-oss-20b's smallest GGUF
    # quant is 11.8GB, too big for an 8GB card even alone. Dolphin is
    # the official Cognitive Computations "uncensored" 8B, same llama-3
    # chat template as the primary model.
    display_name: "Dolphin 2.9 Llama3 8B (uncensored) -- general/closest to ChatGPT"
    model_path: "/home/mickey/Downloads/gremlin/models/dolphin-2.9-llama3-8b-q4_K_M.gguf"
    n_ctx: 4096
    n_gpu_layers: 10
    chat_format: llama-3

  - name: gemma-3-12b
    type: local_gguf
    # Swapped for gemma-2-9b-it-abliterated -- gemma-3-12b's smallest
    # usable quant (7.3GB) left too little VRAM headroom alongside the
    # primary model.
    display_name: "Gemma 2 9B (abliterated) -- closest to Gemini"
    model_path: "/home/mickey/Downloads/gremlin/models/gemma-2-9b-it-abliterated-Q4_K_M.gguf"
    n_ctx: 4096
    n_gpu_layers: 10
    chat_format: gemma

  - name: qwen3-coder
    type: local_gguf
    # Swapped for Qwen2.5-Coder-7B-Instruct-abliterated -- no abliterated
    # Qwen3-Coder GGUF at a reasonable size was available; 2.5-Coder-7B
    # is the well-established, reputably-quantized equivalent.
    display_name: "Qwen2.5-Coder 7B (abliterated) -- best for code"
    model_path: "/home/mickey/Downloads/gremlin/models/Qwen2.5-Coder-7B-Instruct-abliterated-Q4_K_M.gguf"
    n_ctx: 4096
    n_gpu_layers: 10
    chat_format: qwen

  - name: deepseek-r1-distill-8b
    type: local_gguf
    display_name: "DeepSeek-R1-Distill-Qwen-8B (abliterated) -- deep reasoning/math"
    model_path: "/home/mickey/Downloads/gremlin/models/DeepSeek-R1-Distill-Qwen-8B-Abliterated.i1-Q4_K_M.gguf"
    n_ctx: 4096
    n_gpu_layers: 10
    chat_format: qwen

  # Claude and Gemini -- kept as fallback/last-resort, not as consult
  # group members. The 4 local models above are what Gremlin actually
  # "learns from" day to day; these two exist for when the local setup
  # genuinely comes up short (primary errors out, or nothing local had
  # a confident answer) -- a stronger check to fall back on, still
  # contributing to what gets learned and logged.
  #
  # Claude -- disabled for now, .env still has the unfilled placeholder
  # key (sk-ant-your-key-here). Re-enable by uncommenting this block and
  # adding claude back to fallback_models/last_resort_model below once a
  # real ANTHROPIC_API_KEY is set.
  # - name: claude
  #   type: anthropic
  #   display_name: "Claude"
  #   model_id: "claude-sonnet-5"
  #   api_key_env: ANTHROPIC_API_KEY

  # Gemini -- set your key: export GEMINI_API_KEY=...
  - name: gemini
    type: gemini
    display_name: "Gemini"
    model_id: "gemini-2.5-flash"
    api_key_env: GEMINI_API_KEY

# Gremlin is its own identity, not just an alias for whichever model
# answers. Every model above is still addressable directly by name
# ("chat qwen3-coder", "chat qwythos-9b", etc.) -- but "gremlin" is
# always the same name/character talking to you, backed by qwythos-9b
# as its own local base.
#
# Local-first, not fully local: qwythos-9b answers directly, the 4
# local models are what it consults when uncertain, and Claude/Gemini
# sit behind both of those as a stronger safety net -- fallback_models
# if the primary itself errors out, last_resort_model if the whole
# local consult group came up empty-handed. Either way, whatever comes
# back still gets folded into Gremlin's own voice and logged the same
# as a local consult would be, not just handed back raw.
#
# system_prompt is empty by default: Gremlin doesn't get a scripted
# personality unless you write one. It applies in exactly two places --
# nowhere else, and never to a model you address directly by name:
#   1. gremlin's own direct answers (via primary_model / fallback_models)
#   2. the final answer after a consult -- other models only ever supply
#      raw research; the actual reply is always generated by gremlin
#      itself, in this voice, never forwarded verbatim from another model
persona:
  name: gremlin
  display_name: "Gremlin"
  primary_model: llama-3.1-8b-abliterated
  fallback_models: [gemini]
  # The 4 curated consult models -- gpt-oss for general reasoning,
  # gemma for Gemini-flavored general+multilingual, qwen3-coder for
  # code, deepseek-r1-distill for deep reasoning/math and genuine lab
  # diversity from the other three.
  consult_models: [gpt-oss-20b, gemma-3-12b, qwen3-coder, deepseek-r1-distill-8b]
  # Only tried if NOTHING in consult_models came back with a confident
  # answer -- a dedicated final check, not just another name in the
  # list above.
  last_resort_model: gemini
  # Since the abliterated primary rarely hedges in words even when it's
  # wrong (see gremlin_core/consult.py's seems_uncertain), the keyword
  # trigger alone almost never fires a real consult -- which means
  # data/learning_log.jsonl (what `gremlin finetune` trains on) never
  # gets populated by normal use. This makes ~8% of otherwise-confident
  # replies consult anyway, purely to keep real data flowing. Costs a
  # slower response on however many messages land in that 8% (a local
  # consult model has to load), but every consult is still logged the
  # same way an uncertain one would be.
  consult_sample_rate: 0.08
  # A personality is entirely optional -- left as "" here for a plain,
  # unstyled voice: Gremlin answers as itself, no scripted character
  # flavor layered on top. If you want one, write it as multi-line text
  # (system_prompt: | followed by indented lines) -- it's applied in
  # exactly the two places described above, nowhere else.
  system_prompt: |
    Your name is Gremlin. You're a personal AI assistant running locally
    on the user's own desktop. If asked your name or who you are, answer
    as Gremlin.

    Never say things like "as an AI", "as a language model", "I'm just an
    AI", "I don't have personal experiences/feelings", or any other
    disclaimer about what you are, unless the user directly and
    specifically asks whether you're an AI. Don't bring it up unprompted,
    don't hedge answers with it, and don't repeat it turn after turn --
    answer plainly as Gremlin, the way a person would.
