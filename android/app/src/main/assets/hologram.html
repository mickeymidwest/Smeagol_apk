<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: transparent;
    width: 100%; height: 100%;
    -webkit-user-select: none; user-select: none;
    cursor: pointer;
  }
  #stage {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    perspective: 600px;
  }
  #face-wrap {
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out;
  }
  canvas {
    display: block;
    filter: drop-shadow(0 0 12px rgba(150, 255, 90, 0.55));
  }
  #scanlines {
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(150, 255, 90, 0.05) 0px,
      rgba(150, 255, 90, 0.05) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: screen;
    animation: scan-drift 6s linear infinite;
  }
  @keyframes scan-drift {
    from { background-position-y: 0; }
    to   { background-position-y: 100px; }
  }
  #quit-btn {
    position: fixed; top: 4px; right: 6px;
    width: 16px; height: 16px;
    color: rgba(150, 255, 230, 0.5);
    font: 12px monospace;
    text-align: center; line-height: 16px;
    cursor: pointer;
    z-index: 10;
  }
  #quit-btn:hover { color: rgba(255, 255, 255, 0.9); }
</style>
</head>
<body>
  <div id="quit-btn" title="Quit">×</div>
  <div id="stage" class="pywebview-drag-region">
    <div id="face-wrap">
      <canvas id="face" width="180" height="180"></canvas>
    </div>
  </div>
  <div id="scanlines"></div>

<script>
const canvas = document.getElementById('face');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('face-wrap');
const W = canvas.width, H = canvas.height;

// Original stylized face: NOT any specific copyrighted character's
// likeness (not the Warner Bros. Gremlins designs, not the film
// version of anything else) -- generic mischievous-creature/folklore
// traits (pointed ears, angular features, impish grin) drawn
// procedurally, same approach as the rest of this design.
function drawFace(t) {
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2 + 6;
  const bob = Math.sin(t / 900) * 3;
  const flicker = 0.75 + Math.sin(t / 130) * 0.06 + Math.sin(t / 47) * 0.03;

  ctx.save();
  ctx.translate(0, bob);
  ctx.globalAlpha = Math.max(0.4, Math.min(1, flicker));
  ctx.strokeStyle = 'rgba(150, 255, 90, 0.9)';
  ctx.fillStyle = 'rgba(90, 210, 50, 0.10)';
  ctx.lineWidth = 1.4;

  // pointed, bat-ish ears -- drawn BEHIND the head so the head outline
  // overlaps their base and only the pointed tips read clearly
  [-1, 1].forEach(side => {
    ctx.beginPath();
    const baseX = cx + side * 40, baseY = cy - 14;
    const tipX = cx + side * 80, tipY = cy - 50;
    ctx.moveTo(baseX, baseY + 22);
    ctx.quadraticCurveTo(cx + side * 58, baseY - 14, tipX, tipY);
    ctx.quadraticCurveTo(cx + side * 52, baseY + 8, baseX, baseY - 16);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // inner-ear detail line
    ctx.beginPath();
    ctx.moveTo(baseX + side * 4, baseY - 2);
    ctx.quadraticCurveTo(cx + side * 56, baseY - 18, tipX - side * 6, tipY + 12);
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha *= 0.35;
    ctx.stroke();
    ctx.globalAlpha = savedAlpha;
  });

  // head outline -- narrower, more angular than a plain oval: sharper
  // through the jaw and chin rather than uniformly round
  ctx.beginPath();
  ctx.moveTo(cx, cy - 66);
  ctx.bezierCurveTo(cx + 50, cy - 64, cx + 52, cy + 10, cx + 34, cy + 42);
  ctx.quadraticCurveTo(cx + 14, cy + 70, cx, cy + 76);
  ctx.quadraticCurveTo(cx - 14, cy + 70, cx - 34, cy + 42);
  ctx.bezierCurveTo(cx - 52, cy + 10, cx - 50, cy - 64, cx, cy - 66);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // wireframe mesh across the head (horizontal + curved verticals)
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    const yOff = i * 18;
    ctx.moveTo(cx - 48, cy + yOff);
    ctx.quadraticCurveTo(cx, cy + yOff + 6, cx + 48, cy + yOff);
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha *= 0.35;
    ctx.stroke();
    ctx.globalAlpha = savedAlpha;
  }
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    const xOff = i * 15;
    ctx.moveTo(cx + xOff, cy - 62);
    ctx.quadraticCurveTo(cx + xOff * 1.3, cy, cx + xOff, cy + 68);
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha *= 0.3;
    ctx.stroke();
    ctx.globalAlpha = savedAlpha;
  }

  // angled, mischievous brows
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.moveTo(cx + side * 8, cy - 24);
    ctx.lineTo(cx + side * 30, cy - 30 - side * 2);
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha *= 0.6;
    ctx.stroke();
    ctx.globalAlpha = savedAlpha;
  });

  // large pale-green eyes, slightly luminous
  const eyeY = cy - 8;
  const blink = (Math.sin(t / 2100) > 0.985) ? 0.15 : 1;
  [-1, 1].forEach(side => {
    ctx.save();
    ctx.translate(cx + side * 20, eyeY);
    ctx.scale(1, blink);
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 14, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(210, 255, 160, 0.9)';
    ctx.shadowColor = 'rgba(160, 255, 90, 0.9)';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, 0, 4.5, 6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(15, 45, 10, 0.9)';
    ctx.shadowBlur = 0;
    ctx.fill();
    ctx.restore();
  });

  // wide, impish grin with a couple of small pointed teeth
  ctx.beginPath();
  ctx.moveTo(cx - 20, cy + 36);
  ctx.quadraticCurveTo(cx, cy + 46, cx + 20, cy + 34);
  ctx.globalAlpha = 0.6;
  ctx.stroke();
  ctx.globalAlpha = Math.max(0.4, Math.min(1, flicker));
  [-1, 1].forEach(side => {
    ctx.beginPath();
    const toothX = cx + side * 9;
    ctx.moveTo(toothX - 3, cy + 38);
    ctx.lineTo(toothX, cy + 45);
    ctx.lineTo(toothX + 3, cy + 38);
    ctx.closePath();
    ctx.fillStyle = 'rgba(210, 255, 200, 0.7)';
    ctx.fill();
  });

  ctx.restore();
}

let start = null;
function tick(ts) {
  if (start === null) start = ts;
  drawFace(ts - start);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// idle 3D-ish rotation, plus a little parallax toward the cursor
let idlePhase = 0;
function idleRotate() {
  idlePhase += 0.01;
  const idleY = Math.sin(idlePhase) * 10;
  wrap.style.transform = `rotateY(${idleY}deg) rotateX(2deg)`;
  requestAnimationFrame(idleRotate);
}
requestAnimationFrame(idleRotate);

// The in-page quit control is a desktop convention (frameless window,
// no OS chrome to close it with) -- doesn't apply on Android, where
// back/home already does that job.
if (window.Android) {
  document.getElementById('quit-btn').style.display = 'none';
}

document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.id === 'quit-btn') return;
  if (window.Android && window.Android.openSettings) {
    window.Android.openSettings();       // Android WebView bridge
  } else if (window.pywebview) {
    window.pywebview.api.open_settings(); // desktop pywebview bridge
  }
});

document.getElementById('quit-btn').addEventListener('click', () => {
  if (window.Android && window.Android.quit) {
    window.Android.quit();
  } else if (window.pywebview) {
    window.pywebview.api.quit();
  }
});
</script>
</body>
</html>
