<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: transparent;
    width: 100%; height: 100%;
    -webkit-user-select: none; user-select: none;
    display: flex; flex-direction: column;
  }
  #stage {
    flex: 1;
    width: 100%;
    display: flex; align-items: center; justify-content: center;
    perspective: 700px;
    cursor: grab;
    touch-action: none;
  }
  #stage.dragging { cursor: grabbing; }
  #prism {
    position: relative;
    width: 180px; height: 180px;
    transform-style: preserve-3d;
  }
  .face {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    backface-visibility: hidden;
  }
  .face canvas {
    display: block;
    filter: drop-shadow(0 0 12px rgba(150, 255, 90, 0.55));
  }
  .face-label {
    position: absolute; left: 0; right: 0; bottom: 2px;
    text-align: center;
    font: 9px/1.2 monospace;
    letter-spacing: 0.02em;
    color: rgba(180, 255, 220, 0.65);
    text-shadow: 0 0 6px rgba(120, 255, 200, 0.5);
    pointer-events: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #below-zone {
    height: 22px;
    width: 100%;
    cursor: pointer;
  }
  #scanlines {
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(150, 255, 90, 0.05) 0px,
      rgba(150, 255, 90, 0.05) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: screen;
    animation: scan-drift 6s linear infinite;
  }
  @keyframes scan-drift {
    from { background-position-y: 0; }
    to   { background-position-y: 100px; }
  }
  #quit-btn {
    position: fixed; top: 4px; right: 6px;
    width: 16px; height: 16px;
    color: rgba(150, 255, 230, 0.5);
    font: 12px monospace;
    text-align: center; line-height: 16px;
    cursor: pointer;
    z-index: 10;
  }
  #quit-btn:hover { color: rgba(255, 255, 255, 0.9); }
</style>
</head>
<body>
  <div id="quit-btn" title="Quit">×</div>
  <div id="stage" class="pywebview-drag-region">
    <div id="prism">
      <div class="face" data-slot="0"><canvas width="180" height="180"></canvas><div class="face-label"></div></div>
      <div class="face" data-slot="1"><canvas width="180" height="180"></canvas><div class="face-label"></div></div>
      <div class="face" data-slot="2"><canvas width="180" height="180"></canvas><div class="face-label"></div></div>
      <div class="face" data-slot="3"><canvas width="180" height="180"></canvas><div class="face-label"></div></div>
    </div>
  </div>
  <div id="below-zone" title="Gremlin's own settings"></div>
  <div id="scanlines"></div>

<script>
// Four faces of a turntable "prism" -- not a literal cube (no top/bottom,
// just 4 vertical panels 90 degrees apart) -- each one the SAME
// procedurally-drawn face as before (drawFace, unchanged), tagged with a
// small label so the 4 local consult models are distinguishable as you
// spin it. The prism itself (as a whole) is Gremlin's own hologram --
// tapping any face edits that slot's model; tapping below it (not part
// of the head at all) edits Gremlin's own primary settings.
const FACES = Array.from(document.querySelectorAll('.face')).map((el, i) => ({
  el,
  canvas: el.querySelector('canvas'),
  label: el.querySelector('.face-label'),
  angle: i * 90,          // fixed geometry, faces 90deg apart
  modelName: null,        // filled in once /status loads
}));
FACES.forEach(f => {
  f.ctx = f.canvas.getContext('2d');
  f.el.style.transform = `rotateY(${f.angle}deg) translateZ(90px)`;
});

const stage = document.getElementById('stage');
const prism = document.getElementById('prism');
const belowZone = document.getElementById('below-zone');

// Whether Gremlin is actively generating an answer right now -- drives
// the animated-mouth branch in drawFace() below. Android pushes this
// directly via evaluateJavascript (see MainActivity.sendMessage());
// desktop has no such direct channel (the terminal chat and this
// window are separate processes), so it's polled from the shared
// file-based signal instead -- see pollTalking() further down.
let TALKING = false;
function setTalking(v) { TALKING = !!v; }

// Original stylized face: NOT any specific copyrighted character's
// likeness (not the Warner Bros. Gremlins designs, not the film
// version of anything else) -- generic mischievous-creature/folklore
// traits (pointed ears, angular features, impish grin) drawn
// procedurally, same approach as the rest of this design.
function drawFace(ctx, W, H, t) {
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2 + 6;
  const bob = Math.sin(t / 900) * 3;
  const flicker = 0.75 + Math.sin(t / 130) * 0.06 + Math.sin(t / 47) * 0.03;

  ctx.save();
  ctx.translate(0, bob);
  ctx.globalAlpha = Math.max(0.4, Math.min(1, flicker));
  ctx.strokeStyle = 'rgba(150, 255, 90, 0.9)';
  ctx.fillStyle = 'rgba(90, 210, 50, 0.10)';
  ctx.lineWidth = 1.4;

  // pointed, bat-ish ears -- drawn BEHIND the head so the head outline
  // overlaps their base and only the pointed tips read clearly
  [-1, 1].forEach(side => {
    ctx.beginPath();
    const baseX = cx + side * 40, baseY = cy - 14;
    const tipX = cx + side * 80, tipY = cy - 50;
    ctx.moveTo(baseX, baseY + 22);
    ctx.quadraticCurveTo(cx + side * 58, baseY - 14, tipX, tipY);
    ctx.quadraticCurveTo(cx + side * 52, baseY + 8, baseX, baseY - 16);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // inner-ear detail line
    ctx.beginPath();
    ctx.moveTo(baseX + side * 4, baseY - 2);
    ctx.quadraticCurveTo(cx + side * 56, baseY - 18, tipX - side * 6, tipY + 12);
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha *= 0.35;
    ctx.stroke();
    ctx.globalAlpha = savedAlpha;
  });

  // head outline -- narrower, more angular than a plain oval: sharper
  // through the jaw and chin rather than uniformly round
  ctx.beginPath();
  ctx.moveTo(cx, cy - 66);
  ctx.bezierCurveTo(cx + 50, cy - 64, cx + 52, cy + 10, cx + 34, cy + 42);
  ctx.quadraticCurveTo(cx + 14, cy + 70, cx, cy + 76);
  ctx.quadraticCurveTo(cx - 14, cy + 70, cx - 34, cy + 42);
  ctx.bezierCurveTo(cx - 52, cy + 10, cx - 50, cy - 64, cx, cy - 66);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // wireframe mesh across the head (horizontal + curved verticals)
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    const yOff = i * 18;
    ctx.moveTo(cx - 48, cy + yOff);
    ctx.quadraticCurveTo(cx, cy + yOff + 6, cx + 48, cy + yOff);
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha *= 0.35;
    ctx.stroke();
    ctx.globalAlpha = savedAlpha;
  }
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    const xOff = i * 15;
    ctx.moveTo(cx + xOff, cy - 62);
    ctx.quadraticCurveTo(cx + xOff * 1.3, cy, cx + xOff, cy + 68);
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha *= 0.3;
    ctx.stroke();
    ctx.globalAlpha = savedAlpha;
  }

  // angled, mischievous brows
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.moveTo(cx + side * 8, cy - 24);
    ctx.lineTo(cx + side * 30, cy - 30 - side * 2);
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha *= 0.6;
    ctx.stroke();
    ctx.globalAlpha = savedAlpha;
  });

  // large pale-green eyes, slightly luminous
  const eyeY = cy - 8;
  const blink = (Math.sin(t / 2100) > 0.985) ? 0.15 : 1;
  [-1, 1].forEach(side => {
    ctx.save();
    ctx.translate(cx + side * 20, eyeY);
    ctx.scale(1, blink);
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 14, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(210, 255, 160, 0.9)';
    ctx.shadowColor = 'rgba(160, 255, 90, 0.9)';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, 0, 4.5, 6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(15, 45, 10, 0.9)';
    ctx.shadowBlur = 0;
    ctx.fill();
    ctx.restore();
  });

  // mouth: while TALKING (see setTalking() below), an animated
  // open/close flap in place of the usual static grin -- otherwise the
  // wide, impish grin with a couple of small pointed teeth, unchanged.
  if (TALKING) {
    const openAmt = 0.3 + Math.abs(Math.sin(t / 65)) * 0.7; // fast flap, 0.3..1
    ctx.beginPath();
    ctx.ellipse(cx, cy + 40, 13, 4 + openAmt * 11, 0, 0, Math.PI * 2);
    ctx.globalAlpha = Math.max(0.4, Math.min(1, flicker));
    ctx.fillStyle = 'rgba(20, 55, 15, 0.85)';
    ctx.fill();
    ctx.stroke();
    if (openAmt > 0.55) {
      [-1, 1].forEach(side => {
        ctx.beginPath();
        const toothX = cx + side * 8;
        ctx.moveTo(toothX - 2, cy + 34);
        ctx.lineTo(toothX, cy + 39);
        ctx.lineTo(toothX + 2, cy + 34);
        ctx.closePath();
        ctx.fillStyle = 'rgba(210, 255, 200, 0.6)';
        ctx.fill();
      });
    }
  } else {
    ctx.beginPath();
    ctx.moveTo(cx - 20, cy + 36);
    ctx.quadraticCurveTo(cx, cy + 46, cx + 20, cy + 34);
    ctx.globalAlpha = 0.6;
    ctx.stroke();
    ctx.globalAlpha = Math.max(0.4, Math.min(1, flicker));
    [-1, 1].forEach(side => {
      ctx.beginPath();
      const toothX = cx + side * 9;
      ctx.moveTo(toothX - 3, cy + 38);
      ctx.lineTo(toothX, cy + 45);
      ctx.lineTo(toothX + 3, cy + 38);
      ctx.closePath();
      ctx.fillStyle = 'rgba(210, 255, 200, 0.7)';
      ctx.fill();
    });
  }

  ctx.restore();
}

let start = null;
function tick(ts) {
  if (start === null) start = ts;
  const t = ts - start;
  // Each face offset slightly in phase so all 4 aren't blinking/bobbing
  // in perfect lockstep -- cheap way to make the whole thing feel less
  // like 4 copies of one animation.
  FACES.forEach((f, i) => drawFace(f.ctx, 180, 180, t + i * 401));
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ---- rotation: drag-to-spin (any direction around the vertical axis),
// with momentum on release that decays into a snap to the nearest
// face-forward angle, and idle auto-rotation that resumes after a
// few seconds of no interaction. Replaces the old passive wobble.
let rotY = 0;
let dragging = false, moved = false;
let lastX = 0, lastY = 0, lastT = 0, velocity = 0;
let startX = 0, startY = 0;
let settleFrame = null, idleFrame = null, idleTimeout = null;

function applyTransform(extraTiltDeg) {
  prism.style.transform = `rotateX(${extraTiltDeg}deg) rotateY(${rotY}deg)`;
}
applyTransform(4);

function stopSettle() {
  if (settleFrame) { cancelAnimationFrame(settleFrame); settleFrame = null; }
}
function stopIdle() {
  if (idleFrame) { cancelAnimationFrame(idleFrame); idleFrame = null; }
  if (idleTimeout) { clearTimeout(idleTimeout); idleTimeout = null; }
}
function scheduleIdle() {
  stopIdle();
  idleTimeout = setTimeout(() => {
    function spin() {
      rotY += 0.15;
      applyTransform(4);
      idleFrame = requestAnimationFrame(spin);
    }
    idleFrame = requestAnimationFrame(spin);
  }, 4000);
}

function momentumThenSnap() {
  let v = velocity;
  function step() {
    if (Math.abs(v) > 0.4) {
      rotY += v;
      v *= 0.93;
      applyTransform(4);
      settleFrame = requestAnimationFrame(step);
    } else {
      const target = Math.round(rotY / 90) * 90;
      const from = rotY;
      const dist = target - from;
      const dur = 260;
      const t0 = performance.now();
      function ease(tt) {
        rotY = from + dist * (1 - Math.pow(1 - tt, 3));
        applyTransform(4);
        if (tt < 1) {
          settleFrame = requestAnimationFrame(() => ease(Math.min(1, (performance.now() - t0) / dur)));
        } else {
          rotY = target;
          applyTransform(4);
          scheduleIdle();
        }
      }
      ease(0);
    }
  }
  settleFrame = requestAnimationFrame(step);
}

stage.addEventListener('pointerdown', (e) => {
  dragging = true; moved = false;
  startX = lastX = e.clientX; startY = e.clientY; lastT = performance.now();
  velocity = 0;
  stage.classList.add('dragging');
  stage.setPointerCapture(e.pointerId);
  stopSettle(); stopIdle();
});

stage.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  if (Math.abs(e.clientX - startX) > 4 || Math.abs(e.clientY - startY) > 4) moved = true;
  const now = performance.now();
  const dt = Math.max(1, now - lastT);
  rotY += dx * 0.6;
  velocity = (dx * 0.6) / (dt / 16.7); // deg per ~frame, roughly
  applyTransform(4);
  lastX = e.clientX; lastY = e.clientY; lastT = now;
});

stage.addEventListener('pointerup', (e) => {
  if (!dragging) return;
  dragging = false;
  stage.classList.remove('dragging');
  if (!moved) {
    handleTap();
    scheduleIdle();
  } else {
    momentumThenSnap();
  }
});
stage.addEventListener('pointercancel', () => {
  dragging = false;
  stage.classList.remove('dragging');
  scheduleIdle();
});

scheduleIdle();

// ---- model data: which of the 4 faces is which consult model, fetched
// once from /status (desktop: pywebview bridge already used by
// settings.html; Android: a synchronous bridge method that returns
// whatever the app last fetched, since addJavascriptInterface calls
// can't return a Promise). Retried once in case the first call lands
// before the host has any status cached yet.
function fetchStatus() {
  if (window.Android && window.Android.getStatusJson) {
    try {
      const raw = window.Android.getStatusJson();
      return Promise.resolve(raw ? JSON.parse(raw) : null);
    } catch (e) {
      return Promise.resolve(null);
    }
  } else if (window.pywebview) {
    return window.pywebview.api.get_status();
  }
  return Promise.resolve(null);
}

function applyStatus(status) {
  if (!status || !Array.isArray(status.consult_models) || status.consult_models.length === 0) return;
  const byName = {};
  (status.models || []).forEach(m => { byName[m.name] = m; });
  status.consult_models.slice(0, 4).forEach((name, i) => {
    FACES[i].modelName = name;
    const info = byName[name];
    FACES[i].label.textContent = (info && info.display_name) ? info.display_name.split(' ')[0] : name;
  });
}

function loadStatus(retry) {
  fetchStatus().then(status => {
    applyStatus(status);
    if (retry && (!status || !status.consult_models || !status.consult_models.length)) {
      setTimeout(() => loadStatus(false), 1500);
    }
  });
}
loadStatus(true);
if (window.pywebview) {
  window.addEventListener('pywebviewready', () => loadStatus(true));
}

// ---- talking-mouth animation: Android sets TALKING directly (no
// polling needed, see the comment by its declaration above); desktop
// has no such push channel between the terminal chat and this window,
// so poll the file-based signal instead. Harmless no-op on Android,
// where window.pywebview never exists.
function pollTalking() {
  if (window.pywebview && window.pywebview.api && window.pywebview.api.is_talking) {
    window.pywebview.api.is_talking().then(v => { TALKING = !!v; });
  }
}
setInterval(pollTalking, 400);

// ---- click routing
function openModel(name) {
  if (!name) { openPrimary(); return; }
  if (window.Android && window.Android.openModelSettings) {
    window.Android.openModelSettings(name);
  } else if (window.pywebview) {
    window.pywebview.api.open_model_settings(name);
  }
}
function openPrimary() {
  if (window.Android && window.Android.openSettings) {
    window.Android.openSettings();
  } else if (window.pywebview) {
    window.pywebview.api.open_settings();
  }
}

function handleTap() {
  // Whichever face is currently closest to facing the viewer (rotY is
  // always a multiple of 90 at rest) is the one being "picked."
  const normalized = ((Math.round(rotY / 90) % 4) + 4) % 4;
  const frontIndex = (4 - normalized) % 4; // faces[i] sits at angle i*90; facing viewer when i*90 + rotY == 0 (mod 360)
  openModel(FACES[frontIndex].modelName);
}

belowZone.addEventListener('click', () => openPrimary());

// The in-page quit control is a desktop convention (frameless window,
// no OS chrome to close it with) -- doesn't apply on Android, where
// back/home already does that job.
if (window.Android) {
  document.getElementById('quit-btn').style.display = 'none';
}

document.getElementById('quit-btn').addEventListener('click', () => {
  if (window.Android && window.Android.quit) {
    window.Android.quit();
  } else if (window.pywebview) {
    window.pywebview.api.quit();
  }
});
</script>
</body>
</html>
