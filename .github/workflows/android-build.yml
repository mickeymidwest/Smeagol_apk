name: Android Build

# This is the real compile check that never happened until now -- I
# have no Android SDK, emulator, or Kotlin compiler in my own
# environment, so everything shipped before this was checked as
# thoroughly as possible without ever actually being built. This
# workflow runs on a real GitHub-hosted Ubuntu runner with a real
# Android SDK and a real Gradle installation, so its result is actual
# proof, not another layer of "looks right to me."
#
# Lives at the repo root (not android/.github/workflows/) because
# that's the only place GitHub Actions actually looks -- it never scans
# subfolders for workflow files. Everything below accounts for the
# Android project itself living in the android/ subfolder rather than
# at the repo root.

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'android/**'
  workflow_dispatch:  # lets you trigger a build manually from the Actions tab, regardless of paths

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # No Gradle wrapper jar is committed in this repo (see
      # android/README.md for why -- it's a compiled binary I can't
      # safely produce without a working Gradle installation of my
      # own). setup-gradle below installs a real Gradle distribution
      # directly onto the runner, so this workflow uses the `gradle`
      # command rather than `./gradlew`. If you generate a real wrapper
      # later, switching this to `./gradlew` works too.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gremlin-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
