<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: transparent;
    width: 100%; height: 100%;
    -webkit-user-select: none; user-select: none;
    cursor: pointer;
  }
  #stage {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    perspective: 600px;
  }
  #face-wrap {
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out;
  }
  canvas {
    display: block;
    filter: drop-shadow(0 0 12px rgba(80, 255, 220, 0.55));
  }
  #scanlines {
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(120, 255, 220, 0.05) 0px,
      rgba(120, 255, 220, 0.05) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: screen;
    animation: scan-drift 6s linear infinite;
  }
  @keyframes scan-drift {
    from { background-position-y: 0; }
    to   { background-position-y: 100px; }
  }
  #quit-btn {
    position: fixed; top: 4px; right: 6px;
    width: 16px; height: 16px;
    color: rgba(150, 255, 230, 0.5);
    font: 12px monospace;
    text-align: center; line-height: 16px;
    cursor: pointer;
    z-index: 10;
  }
  #quit-btn:hover { color: rgba(255, 255, 255, 0.9); }
</style>
</head>
<body>
  <div id="quit-btn" title="Quit">×</div>
  <div id="stage" class="pywebview-drag-region">
    <div id="face-wrap">
      <canvas id="face" width="180" height="180"></canvas>
    </div>
  </div>
  <div id="scanlines"></div>

<script>
const canvas = document.getElementById('face');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('face-wrap');
const W = canvas.width, H = canvas.height;

// Original stylized face: NOT the film character's likeness -- an
// abstract, pale, large-eyed wireframe head, drawn procedurally.
function drawFace(t) {
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2 + 6;
  const bob = Math.sin(t / 900) * 3;
  const flicker = 0.75 + Math.sin(t / 130) * 0.06 + Math.sin(t / 47) * 0.03;

  ctx.save();
  ctx.translate(0, bob);
  ctx.globalAlpha = Math.max(0.4, Math.min(1, flicker));
  ctx.strokeStyle = 'rgba(110, 255, 225, 0.9)';
  ctx.fillStyle = 'rgba(60, 255, 210, 0.10)';
  ctx.lineWidth = 1.4;

  // head outline -- elongated oval, gaunt
  ctx.beginPath();
  ctx.ellipse(cx, cy, 52, 66, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // wireframe mesh across the head (horizontal + curved verticals)
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, 52, 66, 0, 0, Math.PI * 2, false);
    ctx.save();
    ctx.beginPath();
    const yOff = i * 18;
    ctx.moveTo(cx - 52, cy + yOff);
    ctx.quadraticCurveTo(cx, cy + yOff + 6, cx + 52, cy + yOff);
    ctx.globalAlpha *= 0.35;
    ctx.stroke();
    ctx.restore();
  }
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    const xOff = i * 16;
    ctx.moveTo(cx + xOff, cy - 66);
    ctx.quadraticCurveTo(cx + xOff * 1.3, cy, cx + xOff, cy + 66);
    ctx.globalAlpha *= 0.3;
    ctx.stroke();
  }

  // large pale eyes, slightly luminous
  const eyeY = cy - 8;
  const blink = (Math.sin(t / 2100) > 0.985) ? 0.15 : 1;
  [-1, 1].forEach(side => {
    ctx.save();
    ctx.translate(cx + side * 20, eyeY);
    ctx.scale(1, blink);
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 14, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(190, 255, 240, 0.9)';
    ctx.shadowColor = 'rgba(150, 255, 230, 0.9)';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, 0, 4.5, 6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(10, 40, 35, 0.9)';
    ctx.shadowBlur = 0;
    ctx.fill();
    ctx.restore();
  });

  // simple mouth line, faint
  ctx.beginPath();
  ctx.moveTo(cx - 14, cy + 38);
  ctx.quadraticCurveTo(cx, cy + 42, cx + 14, cy + 38);
  ctx.globalAlpha = 0.5;
  ctx.stroke();

  ctx.restore();
}

let start = null;
function tick(ts) {
  if (start === null) start = ts;
  drawFace(ts - start);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// idle 3D-ish rotation, plus a little parallax toward the cursor
let idlePhase = 0;
function idleRotate() {
  idlePhase += 0.01;
  const idleY = Math.sin(idlePhase) * 10;
  wrap.style.transform = `rotateY(${idleY}deg) rotateX(2deg)`;
  requestAnimationFrame(idleRotate);
}
requestAnimationFrame(idleRotate);

// The in-page quit control is a desktop convention (frameless window,
// no OS chrome to close it with) -- doesn't apply on Android, where
// back/home already does that job.
if (window.Android) {
  document.getElementById('quit-btn').style.display = 'none';
}

document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.id === 'quit-btn') return;
  if (window.Android && window.Android.openSettings) {
    window.Android.openSettings();       // Android WebView bridge
  } else if (window.pywebview) {
    window.pywebview.api.open_settings(); // desktop pywebview bridge
  }
});

document.getElementById('quit-btn').addEventListener('click', () => {
  if (window.Android && window.Android.quit) {
    window.Android.quit();
  } else if (window.pywebview) {
    window.pywebview.api.quit();
  }
});
</script>
</body>
</html>
